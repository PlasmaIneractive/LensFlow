name: Haber Otomasyonu

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install feedparser firebase-admin requests beautifulsoup4
        
      - name: Create JSON file
        run: printf '%s' '${{ secrets.FIREBASE_CREDENTIALS }}' > serviceAccountKey.json
        
      - name: Run bot
        run: python bot.py
