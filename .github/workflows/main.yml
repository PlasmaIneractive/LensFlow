name: HaberBot
on:
  schedule:
    - cron: '*/30 * * * *'
  push:
    branches: [ master ]
  workflow_dispatch:  # <--- Bu satırı ekliyoruz (Elle çalıştırma butonu için)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Uyarıyı çözen satır

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install feedparser firebase-admin requests beautifulsoup4
      - name: Run bot
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python bot.py
