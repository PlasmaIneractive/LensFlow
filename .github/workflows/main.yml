name: Haber Botu Otomasyonu

on:
  schedule:
    - cron: '0 */2 * * *'  # 2 saatte bir çalışır
  workflow_dispatch:        # Manuel çalıştırmak için

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Python Kurulumu
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Gerekli Kütüphaneleri Yükle
        run: pip install feedparser aiohttp firebase-admin anthropic
      - name: Botu Çalıştır
        env:
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python bot.py
