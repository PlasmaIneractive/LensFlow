name: Python application

on:
  push:
    branches: [ master ]
  schedule:
    - cron: '*/30 * * * *' # Her 30 dakikada bir çalışır

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Node.js 24 uyarısını susturur

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser firebase-admin requests beautifulsoup4

     - name: Run bot
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          python bot.py
